name: Bug Report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Laurus version
      description: "Output of `laurus version`"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g., Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: canvas
    attributes:
      label: Canvas instance
      placeholder: "e.g., q.utoronto.ca, canvas.university.edu"
